version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: giragroup_db
    environment:
      POSTGRES_DB: giragroup_db
      POSTGRES_USER: giragroup_user
      POSTGRES_PASSWORD: giragroup_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giragroup_user -d giragroup_db"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: giragroup_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  pipeline:
    build:
      context: .
      dockerfile: infrastructure/docker/pipeline.Dockerfile
    container_name: giragroup_pipeline
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pipeline:/app/pipeline
      - ./uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: giragroup_web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita sobreescribir los módulos de node instalados en el contenedor

volumes:
  postgres_data: