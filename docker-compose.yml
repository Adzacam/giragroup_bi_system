# docker-compose.yml
version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: giragroup_db
    environment:
      POSTGRES_DB: giragroup_bi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d giragroup_bi"]
      interval: 5s
      retries: 5

  api:
    build: ./backend
    container_name: giragroup_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:             
      - DOCKER_ENV=True
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:

